name: Publishing

on:
  release:
    types: [published]

jobs:
  release-build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras --python 3.12

      - name: Build package
        run: uv build

      - name: Upload distribution
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  live-cses-smoke-test:
    name: Live CSES smoke test
    runs-on: ubuntu-latest
    needs: release-build
    env:
      RUN_LIVE_TESTS: "1"
      PHPSESSID: ${{ secrets.PHPSESSID }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen --all-extras --python 3.12

      # If the PHPSESSID repo secret isn't set, the live-tagged tests skip
      # themselves (see tests/*/Test*LiveSmoke classes) rather than failing,
      # so this job is a no-op gate until that secret is added.
      - name: Run tests (including live smoke tests, if PHPSESSID is set)
        run: uv run --python 3.12 pytest

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs:
      - release-build
      - live-cses-smoke-test
    permissions:
      id-token: write  # For trusted publishing

    steps:
      - name: Download release dists
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
